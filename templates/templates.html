{% extends 'base.html' %}
{% block title %}Vorlagen - Salon Karola{% endblock %}
{% block content %}
<section class="app-hero page-hero">
  <div class="app-hero-copy">
    <span class="eyebrow">Admin</span>
    <h1 class="app-hero-title">Vorlagen</h1>
    <p class="app-hero-text">E-Mail-Vorlagen zentral pflegen und auf allen Geräten einheitlich nutzen.</p>
  </div>
  <div class="hero-actions-grid">
    <a class="hero-action primary" href="{{ url_for('email_logs') }}">Logs</a>
    <a class="hero-action" href="{{ url_for('index') }}">Dashboard</a>
  </div>
</section>

<section class="card">
  <form method="post" autocomplete="off" id="template-form">
    <h2>Geburtstag</h2>
    <div class="form-group">
      <label>Betreff</label>
      <input
        type="text"
        name="birthdate_subject"
        id="birthdate_subject"
        autocomplete="off"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
        value="{{ templates['birthdate']['subject'] if 'birthdate' in templates else '' }}"
        data-server-value="{{ templates['birthdate']['subject'] if 'birthdate' in templates else '' }}"
      >
    </div>
    <div class="form-group">
      <label>Text</label>
      <textarea
        name="birthdate_body"
        id="birthdate_body"
        autocomplete="off"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
        data-server-value="{{ templates['birthdate']['body'] if 'birthdate' in templates else '' }}"
      >{{ templates['birthdate']['body'] if 'birthdate' in templates else '' }}</textarea>
    </div>

    <h2>Termin</h2>
    <div class="form-group">
      <label>Betreff</label>
      <input
        type="text"
        name="appointment_subject"
        id="appointment_subject"
        autocomplete="off"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
        value="{{ templates['appointment']['subject'] if 'appointment' in templates else '' }}"
        data-server-value="{{ templates['appointment']['subject'] if 'appointment' in templates else '' }}"
      >
    </div>
    <div class="form-group">
      <label>Text</label>
      <textarea
        name="appointment_body"
        id="appointment_body"
        autocomplete="off"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
        data-server-value="{{ templates['appointment']['body'] if 'appointment' in templates else '' }}"
      >{{ templates['appointment']['body'] if 'appointment' in templates else '' }}</textarea>
    </div>

    <button type="submit">Vorlagen speichern</button>
  </form>
</section>

<script>
(function () {
  const serverValues = {
    birthdate_subject: {{ (templates['birthdate']['subject'] if 'birthdate' in templates else '')|tojson }},
    birthdate_body: {{ (templates['birthdate']['body'] if 'birthdate' in templates else '')|tojson }},
    appointment_subject: {{ (templates['appointment']['subject'] if 'appointment' in templates else '')|tojson }},
    appointment_body: {{ (templates['appointment']['body'] if 'appointment' in templates else '')|tojson }}
  };

  function applyServerValues() {
    Object.entries(serverValues).forEach(([id, value]) => {
      const el = document.getElementById(id);
      if (!el) return;
      if (el.value !== value) {
        el.value = value;
      }
    });
  }

  window.addEventListener("DOMContentLoaded", applyServerValues);
  window.addEventListener("pageshow", applyServerValues);

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.getRegistrations().then((registrations) => {
      registrations.forEach((registration) => {
        registration.update().catch(() => {});
      });
    }).catch(() => {});
  }
})();
</script>
{% endblock %}
