{% extends 'base.html' %}
{% block title %}Vorlagen - Salon Karola{% endblock %}
{% block content %}
<section class="app-hero page-hero">
  <div class="app-hero-copy">
    <span class="eyebrow">Admin</span>
    <h1 class="app-hero-title">Vorlagen</h1>
    <p class="app-hero-text">E-Mail-Vorlagen zentral pflegen und auf allen Geräten einheitlich nutzen.</p>
  </div>
  <div class="hero-actions-grid">
    <a class="hero-action primary" href="{{ url_for('email_logs') }}">Logs</a>
    <a class="hero-action" href="{{ url_for('index') }}">Dashboard</a>
  </div>
</section>

<section class="card">
  <form method="post">
    <h2>Geburtstag</h2>
    <div class="form-group">
      <label>Betreff</label>
      <input type="text" name="birthdate_subject" value="{{ templates['birthdate']['subject'] if 'birthdate' in templates else '' }}">
    </div>
    <div class="form-group">
      <label>Text</label>
      <textarea name="birthdate_body">{{ templates['birthdate']['body'] if 'birthdate' in templates else '' }}</textarea>
    </div>

    <h2>Termin</h2>
    <div class="form-group">
      <label>Betreff</label>
      <input type="text" name="appointment_subject" value="{{ templates['appointment']['subject'] if 'appointment' in templates else '' }}">
    </div>
    <div class="form-group">
      <label>Text</label>
      <textarea name="appointment_body">{{ templates['appointment']['body'] if 'appointment' in templates else '' }}</textarea>
    </div>

    <button type="submit">Vorlagen speichern</button>
  </form>
</section>
{% endblock %}
