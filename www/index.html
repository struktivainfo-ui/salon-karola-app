<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Salon Karola App</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #f8ead9 0%, #f4d9bf 100%);
      color: #2f2419;
    }
    .card {
      max-width: 28rem;
      margin: 1.5rem;
      padding: 1.5rem;
      border-radius: 1.5rem;
      background: rgba(255, 255, 255, 0.8);
      box-shadow: 0 18px 45px rgba(96, 64, 30, 0.15);
      text-align: center;
    }
    h1 {
      margin: 0 0 0.75rem;
      font-size: 1.9rem;
    }
    p {
      margin: 0;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Salon Karola App</h1>
    <p>Die Android-App verbindet sich mit eurer Live-Version auf Render und startet dort die Salon-Oberfläche.</p>
  </div>
</body>
</html>
