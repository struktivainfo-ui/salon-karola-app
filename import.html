{% extends 'base.html' %}
{% block title %}Import - Salon Karola{% endblock %}
{% block content %}
<section class="hero-card">
  <h1 class="hero-title">CSV-Import</h1>
  <p class="hero-text">Kontakte aus einer CSV-Datei übernehmen.</p>
</section>
<section class="card">
  <form method="post" enctype="multipart/form-data">
    <div class="form-group"><label>CSV-Datei</label><input type="file" name="csv_file" accept=".csv" required></div>
    <button type="submit">Import starten</button>
  </form>
</section>
{% endblock %}
