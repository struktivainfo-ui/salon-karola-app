{% extends 'base.html' %}
{% block title %}Login - Salon Karola{% endblock %}
{% block content %}
<div class="login-shell">
  <div class="login-card">
    <img class="login-logo" src="{{ url_for('static', filename='icon-512.png') }}" alt="Salon Karola Logo">
    <h1>Salon Karola</h1>
    <p class="hero-text center">Premium CRM für Termine, Kontakte und automatische Erinnerungen.</p>
    <form method="post" class="space-top">
      <div class="form-group">
        <label>Benutzername</label>
        <input type="text" name="username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label>Passwort</label>
        <input type="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit">Einloggen</button>
    </form>
  </div>
</div>
{% endblock %}
