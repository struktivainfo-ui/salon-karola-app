services:
  - type: web
    name: salon-karola-crm
    runtime: python
    plan: starter
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 2 --timeout 120
    disk:
      name: salon-karola-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: APP_TIMEZONE
        value: Europe/Berlin
      - key: DATABASE_PATH
        value: /var/data/salon_karola.db
      - key: BACKUP_DIR
        value: /var/data/backups
      - key: SMTP_USE_TLS
        value: true
      - key: EMAIL_PROVIDER
        value: smtp
      - key: SECRET_KEY
        generateValue: true
